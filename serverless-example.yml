service: file-manager

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-west-3
  environment:
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID}
    COGNITO_REGION: ${env:COGNITO_REGION}
    S3_BUCKET: ${env:S3_BUCKET}
    S3_REGION: ${env:S3_REGION}
    DB_HOST: ${env:DB_HOST}
    DB_PORT: ${env:DB_PORT}
    DB_NAME: ${env:DB_NAME}
    DB_USER: ${env:DB_USER}
    DB_PASSWORD: ${env:DB_PASSWORD}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource: arn:aws:s3:::${env:S3_BUCKET}/*
        - Effect: Allow
          Action:
            - cognito-idp:InitiateAuth
          Resource: arn:aws:cognito-idp:${env:COGNITO_REGION}:*:userpool/${env:COGNITO_USER_POOL_ID}

functions:
  app:
    handler: src/app.handler
    events:
      - http:
          method: any
          path: /{proxy+}
      - http:
          method: any
          path: /
  migrate:
    handler: src/db/migrate.handler
    timeout: 30

plugins:
  - serverless-dotenv-plugin
  - serverless-offline